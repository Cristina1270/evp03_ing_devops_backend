name: CI/CD Backend - Quality, Test, Security, ECR, Deploy EKS

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

env:
  AWS_REGION: us-east-1
  ECR_REPO_BACKEND: ep03-backend
  K8S_NAMESPACE: ep03
  DEPLOYMENT_NAME: ep03-backend

permissions:
  contents: write

jobs:
  versioning:
    name: Versionado Semantico (v1.x.0)
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.calc.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calcular y crear tag
        id: calc
        run: |
          set -euo pipefail
          LAST=$(git tag --list 'v1.*' --sort=-v:refname | head -1)
          if [ -z "$LAST" ]; then
            NEW="v1.0.0"
          else
            MINOR=$(echo "$LAST" | cut -d. -f2)
            NEW="v1.$((MINOR + 1)).0"
          fi
          echo "Ultimo: ${LAST:-ninguno} -> Nuevo: $NEW"
          echo "new_tag=$NEW" >> "$GITHUB_OUTPUT"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW"
          git push origin "$NEW"

  build-push-ecr:
    name: Build & Push ECR (${{ needs.versioning.outputs.new_tag }})
    runs-on: ubuntu-latest
    needs: versioning
    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_BACKEND }}:${{ needs.versioning.outputs.new_tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_BACKEND }}:latest

  deploy:
    name: Deploy a EKS
    runs-on: ubuntu-latest
    needs: [versioning, build-push-ecr]
    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr-deploy
        uses: aws-actions/amazon-ecr-login@v2

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Configurar kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Deploy a EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr-deploy.outputs.registry }}
          IMAGE_TAG: ${{ needs.versioning.outputs.new_tag }}
        run: |
          kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
            backend=$ECR_REGISTRY/${{ env.ECR_REPO_BACKEND }}:$IMAGE_TAG \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} \
            -n ${{ env.K8S_NAMESPACE }} --timeout=300s
